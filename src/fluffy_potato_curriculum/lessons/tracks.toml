# Curriculum track membership — the single source of truth for which lessons
# belong to the "mini" vs "full" course.
#
# The lesson directories under this folder stay FLAT (L01, L02, ... L25); a
# lesson belongs to a track by membership here, not by its location on disk.
# This mirrors docs/origin/CURRICULUM_PRD.md — `full` is the master lesson
# plan, and `mini` is the "Condensed Mini Lesson Plan" cut. `mini` must always
# be a subset of `full` (every mini lesson is also a full lesson), and both
# lists are in teaching order.
#
# When you add, remove, or renumber a lesson: update the PRD table AND this
# file together so they don't drift.

[full]
# Master lesson plan — all 25 lessons, taught in numeric order.
order = [
  "L01", "L02", "L03", "L04", "L05", "L06", "L07", "L08", "L09", "L10",
  "L11", "L12", "L13", "L14", "L15", "L16", "L17", "L18", "L19", "L20",
  "L21", "L22", "L23", "L24", "L25",
]

[mini]
# Condensed ~30 hr cut: the five-objective core (tool design, when-to-use-a-tool,
# shallow LangGraph agent, eval, tracing) plus the early graph ramp (L03–L05,
# foundational for everything after) and Skills (L22) and skill patterns &
# composition (L23) by explicit request.
order = [
  "L01", "L02", "L03", "L04", "L05", "L07", "L08", "L10", "L11", "L12",
  "L14", "L22", "L23",
]

[titles]
L01 = "LLM and token basics"
L02 = "Prompting fundamentals"
L03 = "Single-node operations"
L04 = "Directed graphs: sequential chaining"
L05 = "Conditional graphs: routing & branching"
L06 = "Teaching an LLM to think via prompting"
L07 = "Tool calling: how it works"
L08 = "Designing good tools"
L09 = "MCP: packaging tools as a portable contract"
L10 = "Hand-rolled agent loop"
L11 = "Tracing: reading what your agent did"
L12 = "Evaluation: first pass"
L13 = "Choosing model power for the task"
L14 = "Shallow agents in LangGraph"
L15 = "LangGraph design patterns"
L16 = "Agent middleware and conditional tools"
L17 = "Human-in-the-loop and approval gates"
L18 = "Deep agents vs. shallow agents"
L19 = "Static system prompt vs. context management"
L20 = "Embeddings and vector similarity"
L21 = "RAG pipeline"
L22 = "Skills: just-in-time capabilities for agents"
L23 = "Skill patterns & composition"
L24 = "Multi-agent / subagent architecture (stretch)"
L25 = "Evaluation revisited"
