# Curriculum track membership — the single source of truth for which lessons
# belong to the "mini" vs "full" course.
#
# The lesson directories under this folder stay FLAT (L01, L02, ... L25); a
# lesson belongs to a track by membership here, not by its location on disk.
# This mirrors docs/origin/CURRICULUM_PRD.md — `full` is the master lesson
# plan, and `mini` is the "Condensed Mini Lesson Plan" cut. `mini` must always
# be a subset of `full` (every mini lesson is also a full lesson), and both
# lists are in teaching order.
#
# When you add, remove, or renumber a lesson: update the PRD table AND this
# file together so they don't drift.
#
# The `K<NN>` PREWORK track is separate from the course proper: it is required,
# gated setup students complete BEFORE L01 (environment, keys/config, Jupyter,
# reading typed/pydantic/async code, and a mandatory Docker stack). `K` sorts
# ahead of `L` so it needs no `L<NN>` renumbering. Prework gates BOTH the mini
# and full tracks — it is not a subset relationship, it is a prerequisite.

[prework]
# Required, gated prework — completed before L01 by every student, both tracks.
# Docker (K06) + keys (K02) are hard environment gates; K04/K05 (types/pydantic
# and async) are understanding gates the agent arc assumes.
order = ["K01", "K02", "K03", "K04", "K05", "K06"]
# <need input: does the mini track require the full K01–K06, or a reduced prework
# set? Current opinionated stance: mini requires all six — Docker+keys are
# universal, and K04/K05 gate the agent arc the mini also reaches (L10–L13).>
mini = ["K01", "K02", "K03", "K04", "K05", "K06"]
full = ["K01", "K02", "K03", "K04", "K05", "K06"]

[full]
# Master lesson plan — all 25 lessons, taught in numeric order.
order = [
  "L01", "L02", "L03", "L04", "L05", "L06", "L07", "L08", "L09", "L10",
  "L11", "L12", "L13", "L14", "L15", "L16", "L17", "L18", "L19", "L20",
  "L21", "L22", "L23", "L24", "L25",
]

[mini]
# Condensed ~32 hr cut: the five-objective core (tool design, when-to-use-a-tool,
# shallow LangGraph agent, eval, tracing) plus the early graph ramp (L03–L05,
# foundational for everything after), chain-of-thought prompting (L06), and
# Skills (L22) and skill patterns & composition (L23) by explicit request.
order = [
  "L01", "L02", "L03", "L04", "L05", "L06", "L07", "L08", "L10", "L11",
  "L12", "L13", "L22", "L23",
]

